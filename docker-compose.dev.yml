services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-market}
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:3.7.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: 'true'
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - '9200:9200'
      - '9600:9600'
    volumes:
      - opensearch_dev_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl --silent --fail http://localhost:9200/_cluster/health > /dev/null',
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.7.0
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    ports:
      - '5601:5601'
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  postgres_dev_data:
  opensearch_dev_data:
