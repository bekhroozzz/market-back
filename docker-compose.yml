services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    init: true
    # Sized for a 2-worker PM2 cluster (each worker heap capped at 512 MB).
    mem_limit: 1.5g
    memswap_limit: 1.5g
    cpus: 2
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    environment:
      NODE_ENV: production
      PORT: 4000
      # Number of PM2 cluster workers. Raise only if mem_limit is raised too.
      PM2_INSTANCES: ${PM2_INSTANCES:-2}
      BASE_URL: https://api.locafun.uz
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:?POSTGRES_DATABASE is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      OPENSEARCH_URL: https://opensearch:9200
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD is required}
      OPENSEARCH_PRODUCTS_INDEX: ${OPENSEARCH_PRODUCTS_INDEX:-products}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      CACHE_DEFAULT_TTL: ${CACHE_DEFAULT_TTL:-60}
    expose:
      - '4000'
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      backend: {}
      # Shared Dokploy network so the frontend (a separate app) can reach the
      # API by a stable hostname for server-side rendering.
      dokploy-network:
        aliases:
          - locafun-server-side-api

  opensearch:
    image: opensearchproject/opensearch:3.7.0
    restart: unless-stopped
    environment:
      cluster.name: market-cluster
      node.name: market-node-1
      discovery.type: single-node
      bootstrap.memory_lock: 'true'
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD is required}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl --silent --fail --insecure --user "admin:$${OPENSEARCH_INITIAL_ADMIN_PASSWORD}" "https://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s" > /dev/null',
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - backend
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    # Cache-only: no persistence, evict least-recently-used keys under pressure.
    command:
      [
        'redis-server',
        '--requirepass',
        '${REDIS_PASSWORD:?REDIS_PASSWORD is required}',
        '--maxmemory',
        '256mb',
        '--maxmemory-policy',
        'allkeys-lru',
        '--save',
        '',
        '--appendonly',
        'no',
      ]
    mem_limit: 320m
    memswap_limit: 320m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli -a "$${REDIS_PASSWORD}" ping | grep -q PONG',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

volumes:
  opensearch_data:
    driver: local
  uploads_data:
    driver: local

networks:
  backend:
    driver: bridge
  # Managed by Dokploy; the API joins it to expose a stable alias to the
  # frontend. Verify the exact name with: docker network ls | grep dokploy
  dokploy-network:
    external: true
