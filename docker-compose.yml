services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 4000
      BASE_URL: https://api.locafun.uz
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:?POSTGRES_DATABASE is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      OPENSEARCH_URL: https://opensearch:9200
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD is required}
      OPENSEARCH_PRODUCTS_INDEX: ${OPENSEARCH_PRODUCTS_INDEX:-products}
    expose:
      - '4000'
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - backend

  opensearch:
    image: opensearchproject/opensearch:3.7.0
    restart: unless-stopped
    environment:
      cluster.name: market-cluster
      node.name: market-node-1
      discovery.type: single-node
      bootstrap.memory_lock: 'true'
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD:?OPENSEARCH_PASSWORD is required}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl --silent --fail --insecure --user "admin:$${OPENSEARCH_INITIAL_ADMIN_PASSWORD}" "https://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s" > /dev/null',
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - backend
    mem_limit: 2g

volumes:
  opensearch_data:
    driver: local
  uploads_data:
    driver: local

networks:
  backend:
    driver: bridge
